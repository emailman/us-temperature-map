name: Update Temperatures

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch temperatures
        env:
          OPENWEATHERMAP_API_KEY: ${{ secrets.OPENWEATHERMAP_API_KEY }}
        run: node scripts/fetch-temperatures.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Save the freshly generated file before resetting
          cp dist/temperatures.json /tmp/temperatures_new.json
          # Hard-reset to current remote master to avoid overwriting any
          # files that were pushed to dist/ while this job was running
          git fetch origin master
          git reset --hard origin/master
          # Restore the new temperatures
          cp /tmp/temperatures_new.json dist/temperatures.json
          git add dist/temperatures.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update temperature data"
            git push origin HEAD:master
          fi
